spring:
  application:
    name: lightningbi-engine

  profiles:
    active: dev

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: analytics
    validate-on-migrate: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  security:
    user:
      name: admin
      password: changeme

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  vaadin:
    productionMode: false
    whitelisted-packages: com.lightningbi

server:
  port: 8080
  compression:
    enabled: true
  http2:
    enabled: true

logging:
  level:
    root: INFO
    com.lightningbi: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    liquibase: INFO

---
# Development Profile
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    clickhouse:
      url: jdbc:clickhouse://localhost:8123/analytics
      username: admin
      password:
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    postgres:
      url: jdbc:postgresql://localhost:5432/lightningbi
      username: lightningbi
      password: lightningbi_dev_pass
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2

  liquibase:
    url: jdbc:postgresql://localhost:5432/lightningbi
    user: lightningbi
    password: lightningbi_dev_pass

  data:
    redis:
      host: localhost
      port: 6379

lightningbi:
  security:
    pepper: dev-pepper-change-in-production
    jwt-secret: dev-jwt-secret-change-in-production-min-32-chars
    mfa:
      enabled: false
    rate-limit:
      login-attempts: 10
      window-seconds: 300

  audit:
    enabled: true
    retention-days: 90

  superset:
    url: http://localhost:8088
    enabled: true

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    clickhouse:
      url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:analytics}
      username: ${CLICKHOUSE_USER}
      password: ${CLICKHOUSE_PASSWORD}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    postgres:
      url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5

  liquibase:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  vaadin:
    productionMode: true

  security:
    user:
      name: ${ADMIN_USER}
      password: ${ADMIN_PASSWORD}

lightningbi:
  security:
    pepper: ${SECURITY_PEPPER}
    jwt-secret: ${JWT_SECRET}
    mfa:
      enabled: true
    rate-limit:
      login-attempts: 5
      window-seconds: 900
  
  audit:
    enabled: true
    retention-days: 730
  
  superset:
    url: ${SUPERSET_URL}
    enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.lightningbi: INFO
    org.springframework.security: WARN