spring:
  application:
    name: lightningbi-engine

  profiles:
    active: dev

  # Flyway -> ClickHouse (migrations analytics)
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
    schemas: analytics
    validate-on-migrate: false
    create-schemas: false

  # Liquibase -> Postgres (metadati lbi_*)
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  data:
    redis:
      timeout: 2000ms
      # Spring Boot usa Lettuce di default: pool sotto 'lettuce', non 'jedis'
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Vaadin: proprietà top-level, NON sotto spring
vaadin:
  production-mode: false
  whitelisted-packages: com.lightningbi

server:
  port: 8080
  compression:
    enabled: true
  http2:
    enabled: true

logging:
  level:
    root: INFO
    com.lightningbi: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO
    liquibase: INFO

---
# ============ DEV ============
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    clickhouse:
      jdbc-url: jdbc:clickhouse://localhost:8123/analytics
      username: admin
      password: ""
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    postgres:
      jdbc-url: jdbc:postgresql://localhost:5432/lightningbi
      username: admin
      password: strongpassword
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2

  flyway:
    url: jdbc:clickhouse://localhost:8123/analytics
    user: admin
    password: ""

  liquibase:
    url: jdbc:postgresql://localhost:5432/lightningbi
    user: admin
    password: strongpassword

  data:
    redis:
      host: localhost
      port: 6379

lightningbi:
  security:
    pepper: dev-pepper-change-in-production
    jwt-secret: dev-jwt-secret-change-in-production-min-32-chars
    mfa:
      enabled: false
    rate-limit:
      login-attempts: 10
      window-seconds: 300

  audit:
    enabled: true
    retention-days: 90

  superset:
    url: http://localhost:8088
    enabled: true

---
# ============ PROD ============
# Nessun default localhost: se manca una env var il boot fallisce subito
# (fail-fast), invece di puntare silenziosamente all'host sbagliato.
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    clickhouse:
      jdbc-url: jdbc:clickhouse://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:analytics}
      username: ${CLICKHOUSE_USER}
      password: ${CLICKHOUSE_PASSWORD}
      driver-class-name: com.clickhouse.jdbc.ClickHouseDriver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000

    postgres:
      jdbc-url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 5

  flyway:
    url: jdbc:clickhouse://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:analytics}
    user: ${CLICKHOUSE_USER}
    password: ${CLICKHOUSE_PASSWORD}

  liquibase:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  security:
    user:
      name: ${ADMIN_USER}
      password: ${ADMIN_PASSWORD}

vaadin:
  production-mode: true

lightningbi:
  security:
    pepper: ${SECURITY_PEPPER}
    jwt-secret: ${JWT_SECRET}
    source-encryption-key: ${SOURCE_ENCRYPTION_KEY}
    mfa:
      enabled: true
    rate-limit:
      login-attempts: 5
      window-seconds: 900

  audit:
    enabled: true
    retention-days: 730

  superset:
    url: ${SUPERSET_URL}
    enabled: true

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.lightningbi: INFO
    org.springframework.security: WARN

